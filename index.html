<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Το Πρόγραμμά μου — Upper / Lower</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12141a;
    --bg2:#171a21;
    --surface:#1c2029;
    --surface2:#232833;
    --line:#2e343f;
    --line-soft:#252a34;
    --text:#f1eee7;
    --muted:#8b93a1;
    --muted2:#5f6674;
    --silh-base:#2a2f3a;
    --silh-detail:#363d4a;

    --upper:#f5a623;
    --lower:#2dd4bf;
    --push:#ff6b5b;
    --pull:#8b7cf6;
    --legs:#a3e635;

    --accent:var(--upper);
    --radius:16px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(245,166,35,.06), transparent 60%),
      radial-gradient(1000px 500px at -10% 10%, rgba(45,212,191,.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Manrope',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--accent);color:#101216;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:16px clamp(16px,4vw,40px);
    background:rgba(18,20,26,.82);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0;}
  .brand svg{flex:none;color:var(--muted);}
  .brand .eyebrow{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:1px;
  }
  .brand h1{
    font-family:'Oswald',sans-serif;font-weight:600;
    font-size:clamp(17px,2.4vw,22px);letter-spacing:.02em;margin:0;line-height:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .toggle{
    display:inline-flex;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:4px;gap:2px;flex:none;
  }
  .toggle button{
    font-family:'Oswald',sans-serif;font-weight:500;font-size:13px;letter-spacing:.06em;
    color:var(--muted);background:none;border:none;cursor:pointer;
    padding:8px 14px;border-radius:999px;transition:.2s;white-space:nowrap;
  }
  .toggle button.on{background:var(--text);color:#12141a;}
  .toggle button:not(.on):hover{color:var(--text);}

  /* ---------- Week rail ---------- */
  .wrap{max-width:960px;margin:0 auto;padding:clamp(18px,3vw,32px) clamp(16px,4vw,40px) 80px;}
  .rail{
    display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:26px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
    scroll-snap-type:x proximity;
  }
  .rail::-webkit-scrollbar{height:6px;}
  .rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
  .daytab{
    scroll-snap-align:start;
    position:relative;flex:none;text-align:left;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:12px 16px 12px 15px;min-width:120px;
    transition:.18s;overflow:hidden;
  }
  .daytab:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c);}
  .daytab:hover{border-color:var(--c);transform:translateY(-1px);}
  .daytab.on{background:var(--surface2);border-color:var(--c);box-shadow:0 6px 24px -12px var(--c);}
  .daytab .dow{
    font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);font-weight:500;
  }
  .daytab.on .dow{color:var(--c);}
  .daytab .dttl{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;letter-spacing:.02em;margin-top:2px;color:var(--text);}
  .today-badge{
    display:inline-block;font-family:'Manrope';font-size:9px;font-weight:800;letter-spacing:.14em;
    background:var(--c);color:#12141a;border-radius:5px;padding:2px 6px;margin-top:7px;text-transform:uppercase;
  }

  /* ---------- Day header ---------- */
  .dayhead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;}
  .dayhead .idx{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:.2em;
    color:var(--accent);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;
  }
  .dayhead .idx .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
  .dayhead h2{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(26px,5.4vw,40px);
    margin:0;line-height:1;letter-spacing:.01em;
  }
  .dayhead .count{
    font-family:'Oswald',sans-serif;color:var(--muted);font-size:14px;letter-spacing:.1em;
    text-align:right;white-space:nowrap;
  }
  .dayhead .count b{color:var(--text);font-size:26px;display:block;line-height:1;}

  /* ---------- Exercise list ---------- */
  .list{display:flex;flex-direction:column;gap:10px;}
  .ex{
    display:flex;align-items:center;gap:16px;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;transition:.16s;text-align:left;width:100%;
    font-family:inherit;color:inherit;
  }
  .ex:hover,.ex:focus-visible{border-color:var(--accent);background:var(--surface2);transform:translateY(-1px);outline:none;}
  .ex:focus-visible{box-shadow:0 0 0 2px var(--accent);}
  .ex .n{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;color:var(--muted2);
    width:26px;flex:none;text-align:center;
  }
  .ex:hover .n,.ex:focus-visible .n{color:var(--accent);}
  .ex .mid{flex:1;min-width:0;}
  .ex .name{font-weight:700;font-size:15.5px;line-height:1.25;}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
  .tag{
    font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--muted);
    background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;
  }
  .ex .sr{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.03em;
    color:var(--text);background:var(--bg);border:1px solid var(--line);
    border-radius:9px;padding:7px 11px;white-space:nowrap;flex:none;
  }
  .ex .sr small{display:block;font-size:9px;letter-spacing:.14em;color:var(--muted2);font-weight:500;text-align:center;margin-bottom:1px;}
  .ex .chev{color:var(--muted2);flex:none;transition:.16s;}
  .ex:hover .chev,.ex:focus-visible .chev{color:var(--accent);transform:translateX(2px);}

  .restnote{
    margin-bottom:22px;padding:12px 16px;border:1px dashed var(--line);border-radius:12px;
    color:var(--muted);font-size:13.5px;background:var(--bg2);
  }
  .restnote b{color:var(--text);}

  /* ---------- Notes ---------- */
  details.notes{margin-top:34px;border:1px solid var(--line);border-radius:14px;background:var(--surface);overflow:hidden;}
  details.notes summary{
    list-style:none;cursor:pointer;padding:16px 18px;
    font-family:'Oswald',sans-serif;font-weight:500;letter-spacing:.06em;font-size:15px;
    display:flex;align-items:center;justify-content:space-between;
  }
  details.notes summary::-webkit-details-marker{display:none;}
  details.notes summary .plus{color:var(--muted);transition:.2s;}
  details.notes[open] summary .plus{transform:rotate(45deg);color:var(--text);}
  .notes-body{padding:0 18px 18px;color:var(--muted);font-size:14px;line-height:1.6;}
  .notes-body strong{color:var(--text);font-weight:700;}
  .notes-body p{margin:0 0 10px;}

  /* ---------- Modal ---------- */
  .backdrop{
    position:fixed;inset:0;z-index:60;background:rgba(9,10,14,.72);backdrop-filter:blur(6px);
    display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:.22s;
  }
  .backdrop.show{opacity:1;pointer-events:auto;}
  .modal{
    background:var(--bg2);border:1px solid var(--line);border-bottom:none;
    width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
    border-radius:22px 22px 0 0;transform:translateY(24px);transition:.24s cubic-bezier(.2,.8,.2,1);
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  }
  .backdrop.show .modal{transform:translateY(0);}
  .modal .m-top{
    position:sticky;top:0;background:linear-gradient(var(--bg2),var(--bg2) 70%,transparent);
    padding:20px 22px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;
  }
  .m-top .eb{
    font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin-bottom:4px;
  }
  .m-top h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:23px;margin:0;line-height:1.1;letter-spacing:.01em;}
  .m-close{
    flex:none;background:var(--surface);border:1px solid var(--line);color:var(--muted);
    width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;line-height:1;transition:.16s;
  }
  .m-close:hover{color:var(--text);border-color:var(--accent);}

  .media{
    margin:6px 22px 0;background:
      radial-gradient(500px 240px at 50% 0%, rgba(255,255,255,.03), transparent 70%),
      var(--surface);
    border:1px solid var(--line);border-radius:16px;padding:18px 16px 14px;
  }
  .media-lbl{font-family:'Oswald',sans-serif;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);font-weight:500;margin:2px 2px 9px;}
  .media-lbl:not(:first-child){margin-top:16px;}
  .gifwrap{margin-bottom:2px;}
  .gif-img{width:100%;max-height:300px;object-fit:contain;border-radius:12px;background:#0e1015;border:1px solid var(--line);display:block;}
  .gif-missing{
    border:1px dashed var(--line);border-radius:12px;background:var(--bg);
    padding:22px 18px;text-align:center;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:9px;
  }
  .gif-missing svg{color:var(--muted2);}
  .gif-missing .gm-t{font-weight:700;color:var(--text);font-size:14px;}
  .gif-missing code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);padding:5px 10px;border-radius:7px;word-break:break-all;}
  .gif-missing span{font-size:12px;color:var(--muted2);max-width:360px;line-height:1.55;}
  .gif-missing b{color:var(--muted);}
  .gif-find{
    display:inline-flex;align-items:center;gap:8px;text-decoration:none;
    background:var(--accent);color:#12141a;border-radius:10px;padding:10px 16px;margin:2px 0 4px;
    font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.04em;transition:.15s;
  }
  .gif-find:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .figs{display:flex;justify-content:center;gap:clamp(10px,4vw,34px);}
  .fig{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .fig svg{width:clamp(90px,26vw,120px);height:auto;}
  .fig .cap{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.18em;color:var(--muted2);text-transform:uppercase;}
  .silhouette{fill:var(--silh-base);}
  .m{fill:var(--silh-detail);transition:fill .35s ease, filter .35s ease;}
  .m.active{fill:var(--accent);filter:drop-shadow(0 0 5px var(--accent));}

  .watch{
    display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 6px 2px;
    background:var(--accent);color:#12141a;border-radius:12px;padding:13px;
    font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:.05em;
    text-decoration:none;transition:.16s;
  }
  .watch:hover{filter:brightness(1.08);transform:translateY(-1px);}
  .watch svg{flex:none;}
  .watch-sub{text-align:center;color:var(--muted2);font-size:11px;margin:8px 0 2px;letter-spacing:.02em;}

  .m-body{padding:16px 22px 30px;}

  /* weight tracker */
  .wtrack{
    background:linear-gradient(180deg, color-mix(in srgb,var(--accent) 10%,var(--surface)), var(--surface));
    border:1px solid color-mix(in srgb,var(--accent) 34%,var(--line));
    border-radius:14px;padding:14px 16px 15px;margin-bottom:20px;
  }
  .wt-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .wt-lbl{font-family:'Oswald',sans-serif;font-weight:500;letter-spacing:.08em;font-size:14px;text-transform:uppercase;}
  .wt-date{font-size:11px;color:var(--muted2);font-weight:600;}
  .wt-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .wt-step{
    flex:none;width:42px;height:46px;border-radius:11px;cursor:pointer;
    background:var(--bg);border:1px solid var(--line);color:var(--text);
    font-family:'Oswald',sans-serif;font-size:24px;line-height:1;transition:.15s;
  }
  .wt-step:hover{border-color:var(--accent);color:var(--accent);}
  .wt-step:active{transform:scale(.94);}
  .wt-field{position:relative;flex:1;min-width:96px;}
  .wt-field input{
    width:100%;height:46px;background:var(--bg);border:1px solid var(--line);border-radius:11px;
    color:var(--text);font-family:'Oswald',sans-serif;font-weight:600;font-size:24px;letter-spacing:.02em;
    text-align:center;padding:0 34px 0 12px;transition:.15s;
  }
  .wt-field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 30%,transparent);}
  .wt-unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-weight:700;font-size:14px;pointer-events:none;}
  .wt-reps{display:flex;align-items:center;gap:6px;flex:none;}
  .wt-x{color:var(--muted2);font-family:'Oswald',sans-serif;font-size:18px;}
  .wt-reps input{
    width:56px;height:46px;background:var(--bg);border:1px solid var(--line);border-radius:11px;
    color:var(--text);font-family:'Oswald',sans-serif;font-weight:600;font-size:20px;text-align:center;transition:.15s;
  }
  .wt-reps input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 30%,transparent);}
  .wt-rlbl{color:var(--muted2);font-size:11px;font-weight:600;}
  .wt-hint{margin-top:11px;font-size:12.5px;color:var(--muted);min-height:16px;line-height:1.4;}
  .wt-hint b{color:var(--accent);font-weight:700;}

  /* saved-weight badge on the list card */
  .wbadge{
    display:inline-flex;align-items:center;gap:5px;margin-top:7px;
    font-family:'Oswald',sans-serif;font-weight:500;font-size:12.5px;letter-spacing:.03em;
    color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);
    border:1px solid color-mix(in srgb,var(--accent) 32%,transparent);border-radius:7px;padding:2px 8px;
  }
  .row-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .meta-box{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .meta-box .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:700;margin-bottom:6px;}
  .meta-box .big{font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;letter-spacing:.02em;}
  .meta-box .mtags{display:flex;flex-wrap:wrap;gap:5px;}
  .mtag{font-size:11px;font-weight:700;color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);border-radius:6px;padding:3px 8px;}

  .cues-h{font-family:'Oswald',sans-serif;font-weight:500;letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--muted);margin:0 0 12px;}
  .cues{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:11px;}
  .cues li{display:flex;gap:12px;font-size:14.5px;line-height:1.45;color:var(--text);}
  .cues li .k{
    flex:none;width:22px;height:22px;border-radius:7px;background:var(--surface2);
    color:var(--accent);font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;
    display:flex;align-items:center;justify-content:center;margin-top:1px;
  }

  @media (max-width:560px){
    .ex .name{font-size:14.5px;}
    .dayhead{flex-direction:column;align-items:flex-start;}
    .dayhead .count{text-align:left;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6.5 8v8M17.5 8v8M4 9.5v5M20 9.5v5M6.5 12h11"/></svg>
    <div>
      <div class="eyebrow">Το πρόγραμμά μου</div>
      <h1>Upper / Lower Split</h1>
    </div>
  </div>
  <div class="toggle" id="toggle">
    <button data-mode="four" class="on">4 ΜΕΡΕΣ</button>
    <button data-mode="five">5 ΜΕΡΕΣ</button>
  </div>
</div>

<div class="wrap">
  <div class="rail" id="rail"></div>
  <div id="rest"></div>
  <div class="dayhead" id="dayhead"></div>
  <div class="list" id="list"></div>

  <details class="notes">
    <summary>Σχετικά με το πρόγραμμα <span class="plus">＋</span></summary>
    <div class="notes-body" id="notes"></div>
  </details>
</div>

<div class="backdrop" id="backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="m-title">
    <div class="m-top">
      <div>
        <div class="eb" id="m-eb"></div>
        <h3 id="m-title"></h3>
      </div>
      <button class="m-close" id="m-close" aria-label="Κλείσιμο">✕</button>
    </div>
    <div class="media">
      <div class="media-lbl">Επίδειξη κίνησης</div>
      <div class="gifwrap" id="gifwrap"></div>
      <div class="media-lbl">Μύες που δουλεύουν</div>
      <div class="figs" id="figs"></div>
      <a class="watch" id="watch" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Δες βίντεο επίδειξης
      </a>
      <div class="watch-sub">Ανοίγει αναζήτηση στο YouTube σε νέα καρτέλα</div>
    </div>
    <div class="m-body">
      <div class="wtrack">
        <div class="wt-head">
          <span class="wt-lbl">💪 Το βάρος μου</span>
          <span class="wt-date" id="wt-date"></span>
        </div>
        <div class="wt-controls">
          <button class="wt-step" id="wt-minus" aria-label="Μείωση">−</button>
          <div class="wt-field">
            <input id="wt-weight" type="number" inputmode="decimal" step="0.5" min="0" placeholder="0">
            <span class="wt-unit">kg</span>
          </div>
          <button class="wt-step" id="wt-plus" aria-label="Αύξηση">+</button>
          <div class="wt-reps">
            <span class="wt-x">×</span>
            <input id="wt-reps" type="number" inputmode="numeric" step="1" min="0" placeholder="—">
            <span class="wt-rlbl">επαν.</span>
          </div>
        </div>
        <div class="wt-hint" id="wt-hint"></div>
      </div>
      <div class="row-meta">
        <div class="meta-box">
          <div class="lbl">Σετ × Επαναλήψεις</div>
          <div class="big" id="m-sr"></div>
        </div>
        <div class="meta-box">
          <div class="lbl">Μύες στόχος</div>
          <div class="mtags" id="m-muscles"></div>
        </div>
      </div>
      <p class="cues-h">Εκτέλεση · Σημεία-κλειδιά</p>
      <ul class="cues" id="m-cues"></ul>
    </div>
  </div>
</div>

<script>
/* ---------- muscle id maps for the silhouettes ---------- */
const MUS = {
  "Στήθος":["f-pec-l","f-pec-r"],
  "Ώμοι":["f-delt-l","f-delt-r","b-delt-l","b-delt-r"],
  "Δικέφαλα":["f-bi-l","f-bi-r"],
  "Πήχεις":["f-fore-l","f-fore-r"],
  "Τρικέφαλα":["b-tri-l","b-tri-r"],
  "Πλάτη":["b-lat-l","b-lat-r","b-traps"],
  "Κοιλιακοί":["f-abs"],

/* ---------- state & render ---------- */
let mode = "four";
let dayIndex = 0;
const prog = () => mode==="four" ? FOUR : FIVE;
const todayJs = new Date().getDay();

function pickToday(){
  const arr = prog();
  const i = arr.findIndex(d=>d.jsDay===todayJs);
  return i;
}

function renderRail(){
  const rail = document.getElementById("rail");
  const rest = document.getElementById("rest");
  rail.innerHTML = "";
  const arr = prog();
  arr.forEach((d,i)=>{
    const b = document.createElement("button");
    b.className = "daytab"+(i===dayIndex?" on":"");
    b.style.setProperty("--c", TYPE_C[d.type]);
    b.innerHTML = `<div class="dow">${DOW_SHORT[d.dow]||d.dow}</div>
      <div class="dttl">${d.ttl}</div>
      ${d.jsDay===todayJs?'<span class="today-badge">Σήμερα</span>':''}`;
    b.onclick = ()=>{dayIndex=i;renderAll();};
    rail.appendChild(b);
  });
  // rest-day note
  const isTraining = arr.some(d=>d.jsDay===todayJs);
  rest.innerHTML = isTraining ? "" :
    `<div class="restnote">💤 <b>Σήμερα ξεκούραση.</b> Δεν έχεις προπόνηση προγραμματισμένη — δες όποια μέρα θέλεις παρακάτω.</div>`;
}

function renderDay(){
  const d = prog()[dayIndex];
  document.documentElement.style.setProperty("--accent", TYPE_C[d.type]);
  const head = document.getElementById("dayhead");
  head.innerHTML = `
    <div>
      <div class="idx"><span class="dot"></span>${d.dow}</div>
      <h2>${d.ttl}</h2>
    </div>
    <div class="count"><b>${d.list.length}</b>ασκήσεις</div>`;

  const list = document.getElementById("list");
  list.innerHTML = "";
  d.list.forEach((e,i)=>{
    const btn = document.createElement("button");
    btn.className = "ex";
    const tags = e.muscles.map(m=>`<span class="tag">${m}</span>`).join("");
    const [sets,reps] = e.sr.split(" × ");
    btn.innerHTML = `
      <div class="n">${String(i+1).padStart(2,"0")}</div>
      <div class="mid">
        <div class="name">${e.name}</div>
        <div class="tags">${tags}</div>
        ${wBadge(e)}
      </div>
      <div class="sr"><small>ΣΕΤ × ΕΠΑΝ.</small>${e.sr}</div>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;
    btn.onclick = ()=>openModal(e);
    btn.setAttribute("aria-label", e.name+" — άνοιγμα λεπτομερειών");
    list.appendChild(btn);
  });
}

function renderAll(){renderRail();renderDay();}

  document.getElementById("m-sr").textContent = e.sr;
  document.getElementById("m-muscles").innerHTML = e.muscles.map(m=>`<span class="mtag">${m}</span>`).join("");
  document.getElementById("m-cues").innerHTML = e.cues.map((c,i)=>`<li><span class="k">${i+1}</span><span>${c}</span></li>`).join("");
  document.getElementById("watch").href = "https://www.youtube.com/results?search_query="+encodeURIComponent(e.yt);

  // weight fields
  const rec = WEIGHTS[e.name] || {};
  document.getElementById("wt-weight").value = (rec.w!=null) ? rec.w : "";
  document.getElementById("wt-reps").value = (rec.reps!=null) ? rec.reps : "";
  document.getElementById("wt-date").textContent = rec.ts ? "ενημ. "+fmtDate(rec.ts) : "";
  updateHint(e);

  // gif (falls back to placeholder if the file isn't in ./gifs/ yet)
  const gw = document.getElementById("gifwrap");
  if(e.gif){
    gw.innerHTML = `<img class="gif-img" src="${e.gif}" alt="${e.name}" onerror="this.parentNode.innerHTML=missingGif('${e.gif}','${e.yt}')">`;
  } else {
    gw.innerHTML = missingGif("gifs/…", e.yt);
  }

  // build figures + highlight
  document.getElementById("figs").innerHTML =
    `<div class="fig">${silhouette("f")}<span class="cap">Μπροστά</span></div>
     <div class="fig">${silhouette("b")}<span class="cap">Πίσω</span></div>`;
  const ids = new Set();
  e.muscles.forEach(m=>(MUS[m]||[]).forEach(id=>ids.add(id)));
  ids.forEach(id=>{const el=document.getElementById(id); if(el) el.classList.add("active");});

  backdrop.classList.add("show");
  document.body.style.overflow="hidden";
  document.getElementById("m-close").focus();
}
function closeModal(){
  backdrop.classList.remove("show");
  document.body.style.overflow="";
  if(lastFocused) lastFocused.focus();
}
document.getElementById("m-close").onclick = closeModal;
backdrop.onclick = (ev)=>{if(ev.target===backdrop) closeModal();};
document.addEventListener("keydown", e=>{if(e.key==="Escape"&&backdrop.classList.contains("show")) closeModal();});

/* weight save + steppers */
function commitW(){
  if(!currentEx) return;
  const w = document.getElementById("wt-weight").value.trim();
  const reps = document.getElementById("wt-reps").value.trim();
  if(w==="" && reps===""){
    delete WEIGHTS[currentEx.name];
  } else {
    WEIGHTS[currentEx.name] = { w: w==="" ? null : parseFloat(w), reps: reps==="" ? null : parseInt(reps,10), ts: Date.now() };
  }
  saveW();
  const rec = WEIGHTS[currentEx.name];
  document.getElementById("wt-date").textContent = (rec && rec.ts) ? "ενημ. "+fmtDate(rec.ts) : "";
  updateHint(currentEx);
  renderDay(); // refresh the badges on the list behind the modal
}
function step(delta){
  const el = document.getElementById("wt-weight");
  let v = parseFloat(el.value); if(isNaN(v)) v = 0;
  v = Math.max(0, Math.round((v+delta)*100)/100);
  el.value = v;
  commitW();
}
document.getElementById("wt-plus").onclick = ()=>step(2.5);
document.getElementById("wt-minus").onclick = ()=>step(-2.5);
document.getElementById("wt-weight").addEventListener("input", commitW);
document.getElementById("wt-reps").addEventListener("input", commitW);

/* ---------- mode toggle ---------- */
document.getElementById("toggle").addEventListener("click", ev=>{
  const btn = ev.target.closest("button"); if(!btn) return;
  mode = btn.dataset.mode;
  document.querySelectorAll("#toggle button").forEach(b=>b.classList.toggle("on",b===btn));
  const t = pickToday();
  dayIndex = t>=0 ? t : 0;
  renderAll();
});

/* ---------- init ---------- */
document.getElementById("notes").innerHTML = NOTES;
const t = pickToday();
dayIndex = t>=0 ? t : 0;
renderAll();
</script>
